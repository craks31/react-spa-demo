name: Deploy React SPA to AWS S3


# 1. Trigger the workflow
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this?'
        required: false
        default: 'Manual test'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Run Linters & Tests (Optional)
      - name: Run Checks
        run: |
          npm run lint
          npm test

      # Step 5: Build the React Vite App
      - name: Build Application
        run: npm run build

      # Step 6: Configure AWS Credentials (IAM Access Keys for today)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Change to your region

      # Step 7: Sync the dist folder to S3 and delete old files
      - name: Deploy to AWS S3
        run: |
          aws s3 sync ./dist s3://my-spa-bucket-name --delete
